name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Debug Application
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor iOS Project
        run: |
          # Build a dummy index.html inside dist/client first if needed,
          # so that Capacitor copy verification passes.
          mkdir -p dist/client
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Campayn</title></head><body></body></html>' > dist/client/index.html
          npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS Application (Simulator Target)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Compress App Bundle
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r CampaynCreator.app.zip App.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CampaynCreator-Simulator-iOS
          path: ios/App/build/Build/Products/Debug-iphonesimulator/CampaynCreator.app.zip
